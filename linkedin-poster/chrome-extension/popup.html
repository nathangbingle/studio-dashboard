<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 360px; background: #f7f6f2; color: #1a1a18; }
  .header { padding: 16px; border-bottom: 1px solid rgba(0,0,0,0.08); background: #fff; }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header p { font-size: 11px; color: #888; margin-top: 2px; }
  .body { padding: 16px; }

  .drop-zone {
    border: 2px dashed rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 32px 16px;
    text-align: center;
    background: #fff;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.15s;
  }
  .drop-zone.over { border-color: #1a6b3a; background: #edf7f1; }
  .drop-zone.has-files { border-style: solid; border-color: #1a6b3a; background: #edf7f1; }
  .drop-zone p { font-size: 12px; color: #888; }
  .drop-zone .count { font-size: 18px; font-weight: 600; color: #1a6b3a; }
  .drop-zone input { display: none; }

  .thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; justify-content: center; }
  .thumbs img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(0,0,0,0.1); }

  .type-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .type-btn {
    flex: 1; padding: 8px; border: 1px solid rgba(0,0,0,0.1);
    border-radius: 6px; background: #fff; font-size: 11px;
    cursor: pointer; text-align: center; font-family: inherit;
  }
  .type-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }

  .post-btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: #1a6b3a; color: #fff; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
  }
  .post-btn:disabled { opacity: 0.4; cursor: default; }
  .post-btn:hover:not(:disabled) { background: #155a30; }

  .status { padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 11px; display: none; }
  .status.posting { display: block; background: #eef3fb; color: #1a4d8a; }
  .status.success { display: block; background: #edf7f1; color: #1a6b3a; }
  .status.error { display: block; background: #fef0f0; color: #c0392b; }

  .preview-box { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 6px; padding: 10px; margin-top: 10px; display: none; }
  .preview-box p { font-size: 11px; color: #555; white-space: pre-wrap; max-height: 120px; overflow-y: auto; line-height: 1.4; }
  .preview-box .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }

  .log { margin-top: 12px; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 10px; }
  .log h3 { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .log-item { font-size: 11px; color: #555; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
</style>
</head>
<body>

<div class="header">
  <h1>LinkedIn Headshot Poster</h1>
  <p>Select headshots and post to LinkedIn</p>
</div>

<div class="body">
  <div class="drop-zone" id="dropZone">
    <p>Click to select headshot images</p>
    <div class="thumbs" id="thumbs"></div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="type-row">
    <button class="type-btn active" data-type="auto">Auto</button>
    <button class="type-btn" data-type="spotlight">Spotlight</button>
    <button class="type-btn" data-type="promo">Promo</button>
  </div>

  <button class="post-btn" id="postBtn" disabled>Post to LinkedIn</button>

  <div class="status" id="status"></div>
  <div class="preview-box" id="previewBox">
    <div class="label">Generated caption</div>
    <p id="previewText"></p>
  </div>

  <div class="log" id="logSection">
    <h3>Recent</h3>
    <div id="logEntries"><span style="font-size:11px;color:#aaa">No posts yet</span></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
