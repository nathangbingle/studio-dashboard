<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>422 Crompton · Shared Utilities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a18;
    --muted: #888884;
    --green: #1a6b3a;
    --green-bg: #edf7f1;
    --amber: #92600a;
    --amber-bg: #fef8ed;
    --blue: #1a4d8a;
    --blue-bg: #eef3fb;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo-title { font-size: 15px; font-weight: 500; letter-spacing: 0.01em; }
  .logo-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2db86b; display: inline-block; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .status-text { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .card-value { font-size: 26px; font-weight: 300; font-family: 'DM Mono', monospace; letter-spacing: -0.02em; }
  .card-value.green { color: var(--green); }

  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  thead tr { background: #fafaf8; }
  th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-paid { background: var(--green-bg); color: var(--green); }
  .badge-bill { background: var(--amber-bg); color: var(--amber); }
  .badge-type { background: var(--blue-bg); color: var(--blue); }

  .empty { padding: 40px; text-align: center; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; }

  .last-checked { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .loading { opacity: 0.5; font-size: 13px; padding: 40px; text-align: center; }

  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr 1fr; }
    header { padding: 16px 20px; }
    main { padding: 20px 16px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-title">422 Crompton</span>
    <span class="logo-sub">shared utilities</span>
  </div>
  <div>
    <span class="status-dot"></span>
    <span class="status-text" id="status-text">loading...</span>
  </div>
</header>

<main>
  <div class="cards">
    <div class="card">
      <div class="card-label">Total billed (YTD)</div>
      <div class="card-value" id="card-total">—</div>
    </div>
    <div class="card">
      <div class="card-label">Your share (YTD)</div>
      <div class="card-value green" id="card-share">—</div>
    </div>
    <div class="card">
      <div class="card-label">Bills tracked</div>
      <div class="card-value" id="card-count">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Bills &amp; Payments</span>
      <span class="last-checked" id="last-checked"></span>
    </div>
    <div id="bills-container"><div class="loading">Loading...</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Notifications sent</span>
    </div>
    <div id="notifications-container"><div class="loading">Loading...</div></div>
  </div>
</main>

<script>
const API = "https://studio-bill-monitor-production.up.railway.app/data";

function fmt(n) {
  if (n == null) return "—";
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n);
}

function fmtDate(d) {
  if (!d) return "—";
  try {
    return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  } catch { return d; }
}

function timeAgo(d) {
  if (!d) return "never";
  const diff = Math.floor((Date.now() - new Date(d)) / 1000);
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  return Math.floor(diff / 86400) + "d ago";
}

function utilityIcon(u) {
  if (!u) return "📄";
  const t = u.toLowerCase();
  if (t.includes("electric") || t.includes("power") || t.includes("energy")) return "⚡";
  if (t.includes("gas")) return "🔥";
  if (t.includes("water")) return "💧";
  if (t.includes("internet") || t.includes("wifi") || t.includes("cable")) return "📡";
  return "📄";
}

async function load() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error("API error");
    const data = await res.json();

    // Status
    document.getElementById("status-text").textContent = "checked " + timeAgo(data.lastChecked);

    // Cards
    const bills = data.bills || [];
    const thisYear = new Date().getFullYear();
    const ytdBills = bills.filter(b => b.date && new Date(b.date).getFullYear() === thisYear);
    const total = ytdBills.reduce((s, b) => s + (parseFloat(b.amount) || 0), 0);
    document.getElementById("card-total").textContent = fmt(total);
    document.getElementById("card-share").textContent = fmt(total / 2);
    document.getElementById("card-count").textContent = bills.length;
    if (data.lastChecked) {
      document.getElementById("last-checked").textContent = "last check " + timeAgo(data.lastChecked);
    }

    // Bills table
    const bc = document.getElementById("bills-container");
    if (bills.length === 0) {
      bc.innerHTML = '<div class="empty">No bills detected yet — monitor is running</div>';
    } else {
      bc.innerHTML = `<table>
        <thead><tr>
          <th>Vendor</th><th>Type</th><th>Amount</th><th>Your half</th><th>Date</th><th>Status</th>
        </tr></thead>
        <tbody>${bills.map(b => `<tr>
          <td>${b.vendor || "—"}</td>
          <td>${utilityIcon(b.utility)} <span class="badge badge-type">${b.utility || "other"}</span></td>
          <td class="mono">${fmt(b.amount)}</td>
          <td class="mono" style="color:var(--green)">${fmt((parseFloat(b.amount)||0)/2)}</td>
          <td class="mono">${fmtDate(b.date)}</td>
          <td><span class="badge ${b.type === 'payment' ? 'badge-paid' : 'badge-bill'}">${b.type === 'payment' ? 'Paid' : 'Due'}</span></td>
        </tr>`).join("")}</tbody>
      </table>`;
    }

    // Notifications
    const nc = document.getElementById("notifications-container");
    const notifs = data.notifications || [];
    if (notifs.length === 0) {
      nc.innerHTML = '<div class="empty">No notifications sent yet</div>';
    } else {
      nc.innerHTML = `<table>
        <thead><tr><th>Vendor</th><th>Amount</th><th>Sent to</th><th>Date</th></tr></thead>
        <tbody>${notifs.map(n => `<tr>
          <td>${n.vendor || "—"}</td>
          <td class="mono">${fmt(n.amount)}</td>
          <td style="color:var(--muted);font-size:12px">${(n.notified||[]).join(", ")}</td>
          <td class="mono">${fmtDate(n.date)}</td>
        </tr>`).join("")}</tbody>
      </table>`;
    }

  } catch(e) {
    document.getElementById("status-text").textContent = "offline";
    document.getElementById("bills-container").innerHTML = '<div class="empty">Monitor is starting up — check back in a minute</div>';
    document.getElementById("notifications-container").innerHTML = '<div class="empty"></div>';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
